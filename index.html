<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Chess</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Minimalist Chess</h1>
            <p class="status" id="status">White to move</p>
        </header>

        <div class="board-container">
            <div id="board" class="chess-board"></div>
        </div>

        <div class="controls">
            <button id="resetBtn" class="btn">New Game</button>
            <button id="flipBtn" class="btn secondary">Flip Board</button>
        </div>
    </div>

    <!-- Load chess.js for game logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
