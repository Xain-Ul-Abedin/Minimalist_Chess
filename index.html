<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Chess</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="layout">
        <div class="app-container">
            <header>
                <h1>Cozy Chess</h1>
                <p class="status" id="status">White to move</p>
            </header>

            <div class="timers">
                <div class="player-info">
                    <div class="timer" id="whiteTimer">5:00</div>
                    <div class="captured-pieces" id="whiteCaptured"></div>
                </div>
                <div class="timer-divider">vs</div>
                <div class="player-info">
                    <div class="timer" id="blackTimer">5:00</div>
                    <div class="captured-pieces" id="blackCaptured"></div>
                </div>
            </div>

            <div class="board-container">
                <div id="board" class="chess-board"></div>
            </div>

            <div class="controls">
                <button id="resetBtn" class="btn">New Game</button>
                <button id="flipBtn" class="btn secondary">Flip Board</button>
            </div>
        </div>

        <div class="side-panel">
            <h2>Move History</h2>
            <div class="history-list" id="historyList">
                <!-- Move pairs go here -->
            </div>
        </div>
    </div>

    <!-- Load chess.js for game logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
