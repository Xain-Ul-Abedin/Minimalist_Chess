<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Chess</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="layout">
        <div class="app-container">
            <header>
                <h1>Cozy Chess</h1>
                <p class="status" id="status">White to move</p>
            </header>

            <div class="game-controls">
                <select id="gameMode" class="input-select">
                    <option value="human">Play Human (Local)</option>
                    <option value="ai">Play Computer</option>
                </select>
                <select id="aiDifficulty" class="input-select" disabled>
                    <option value="0">Level 1 (Beginner)</option>
                    <option value="5">Level 5 (Intermediate)</option>
                    <option value="10">Level 10 (Expert)</option>
                    <option value="20">Level 20 (Master)</option>
                </select>
            </div>

            <div class="timers">
                <div class="player-info">
                    <div class="timer" id="whiteTimer">5:00</div>
                    <div class="captured-pieces" id="whiteCaptured"></div>
                </div>
                <div class="timer-divider">vs</div>
                <div class="player-info">
                    <div class="timer" id="blackTimer">5:00</div>
                    <div class="captured-pieces" id="blackCaptured"></div>
                </div>
            </div>

            <div class="board-wrapper">
                <div class="eval-bar-container" title="Evaluation Bar">
                    <div class="eval-bar-black"></div>
                    <div class="eval-bar-white" id="evalBar"></div>
                </div>
                <div class="board-container">
                    <div id="board" class="chess-board"></div>
                </div>
            </div>

            <div class="controls">
                <button id="resetBtn" class="btn">New Game</button>
                <button id="flipBtn" class="btn secondary">Flip Board</button>
                <button id="exportPgnBtn" class="btn secondary"><i class="fa-solid fa-download"></i> PGN</button>
                <button id="importPgnBtn" class="btn secondary"><i class="fa-solid fa-upload"></i> PGN</button>
            </div>
        </div>

        <div class="side-panel">
            <h2>Move History</h2>
            <div class="history-list" id="historyList">
                <!-- Move pairs go here -->
            </div>
        </div>
    </div>

    <!-- Load chess.js for game logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
